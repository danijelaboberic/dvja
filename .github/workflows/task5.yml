name: SBOM and SCA using grype
on: 
  workflow_dispatch:
jobs:
  create-sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout of repo
        uses: actions/checkout@v6.0.2

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 8
          cache: maven
              
      - name: Build Maven project
        run: mvn -B clean package -DskipTest
        
      - name: Generate SBOM using Syft
        uses: anchore/sbom-action@v0
        with:
         path: .
         format: cyclonedx-json
         output-file: sbom.json
   vulnerability-scan:
      runs-on: ubuntu-latest
      needs: generate-sbom
  
      steps:
        - name: Download SBOM artifact
          uses: actions/download-artifact@v4
          with:
            name: dvja-create-sbom.cyclonedx.json
  
        - name: Install Grype
          run: curl -sSfL https://get.anchore.io/grype | sudo sh -s -- -b /usr/local/bin
  
        - name: Scan SBOM with Grype
          run: grype sbom:dvja-create-sbom.cyclonedx.json
        
